<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>DEBUG MODE - XMath</title>
    <style>
        body { background: #121212; color: #00ff00; font-family: monospace; padding: 20px; }
        #raw-display { white-space: pre-wrap; border: 1px solid red; padding: 10px; margin-top: 10px; }
    </style>
</head>
<body>
    <h3>داده‌ای که در حافظه پیدا شد:</h3>
    <div id="raw-display"></div>

    <script>
        window.addEventListener('load', () => {
            const rawData = localStorage.getItem('raw_math_data');
            const display = document.getElementById('raw-display');
            
            console.log("--- START RAW DATA ---");
            console.log(rawData);
            console.log("--- END RAW DATA ---");

            if (rawData) {
                // نمایش مستقیم و بدون دستکاری
                display.textContent = rawData; 
                alert("داده لود شد! کنسول (F12) رو چک کن ببین $ ها هستند یا نه.");
            } else {
                display.textContent = "هیچ دیتایی در حافظه پیدا نشد!";
            }
        });
    </script>
</body>
</html>
