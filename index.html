<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>GapGPT - Gemini UI</title>

    <script>
    window.MathJax = {
      tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$'], ['\\[', '\\]']], processEscapes: true },
      options: { skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code'] },
      startup: { typeset: false }
    };
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        :root { --bg-color: #131314; --sidebar-bg: #1e1f20; --text-color: #e3e3e3; --text-muted: #c4c7c5; --border-color: #444746; --user-bubble: #333537; --input-bg: #1e1f20; --btn-hover: #2a2b2c; }
        [data-theme="light"] { --bg-color: #ffffff; --sidebar-bg: #f0f4f9; --text-color: #1f1f1f; --text-muted: #444746; --border-color: #e3e3e3; --user-bubble: #e1e3e1; --input-bg: #f0f4f9; --btn-hover: #e0e4e9; }
        * { box-sizing: border-box; font-family: system-ui, -apple-system, Tahoma, sans-serif; }
        body { margin: 0; height: 100vh; display: flex; background: var(--bg-color); color: var(--text-color); overflow: hidden; }
        
        /* دکمه‌های پیام ربات */
        .msg-actions { display: flex; gap: 10px; margin-top: 8px; padding-right: 5px; }
        .msg-actions button {
            background: var(--btn-hover);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 4px 12px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 12px;
        }
        .msg-actions button:hover { background: var(--border-color); }

        /* بقیه استایل‌ها */
        .sidebar { width: 260px; background: var(--sidebar-bg); padding: 20px; display: flex; flex-direction: column; gap: 15px; border-left: 1px solid var(--border-color); }
        .main-chat { flex: 1; display: flex; flex-direction: column; position: relative; }
        .chat-container { flex: 1; overflow-y: auto; padding: 30px 15%; display: flex; flex-direction: column; gap: 25px; }
        .message-row { display: flex; width: 100%; flex-direction: column; }
        .message { max-width: 85%; line-height: 1.8; font-size: 15px; white-space: pre-wrap; word-wrap: break-word; }
        .user-msg { background: var(--user-bubble); padding: 12px 24px; border-radius: 24px; align-self: flex-end; }
        .bot-msg { padding: 10px 0; align-self: flex-start; }
        .input-wrapper { padding: 20px 15%; background: var(--bg-color); }
        .input-box { background: var(--input-bg); border: 1px solid var(--border-color); border-radius: 30px; display: flex; align-items: flex-end; padding: 10px 20px; gap: 10px; }
        textarea { flex: 1; background: transparent; border: none; color: var(--text-color); font-size: 16px; resize: none; max-height: 180px; outline: none; }
        .send-btn { background: transparent; border: none; cursor: pointer; padding: 8px; }
        .send-btn svg { fill: var(--text-color); width: 24px; height: 24px; }
        
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .chat-container { padding: 20px 15px; }
            .input-wrapper { padding: 10px; }
        }
    </style>
</head>
<body data-theme="dark">

    <div class="sidebar">
        <button class="btn" onclick="newChat()">چت جدید</button>
        <button class="btn" onclick="toggleTheme()">تغییر تم</button>
    </div>

    <div class="main-chat">
        <div class="chat-container" id="chatContainer"></div>
        <div class="input-wrapper">
            <div class="input-box">
                <textarea id="userInput" placeholder="پیام خود را بنویسید..." rows="1" oninput="autoResize(this)" onkeydown="handleEnter(event)"></textarea>
                <button class="send-btn" onclick="sendMessage()">
                    <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        // دکمه‌های کنترلی
        window.copyRaw = function(btn) {
            const rawText = btn.parentElement.dataset.content;
            navigator.clipboard.writeText(rawText);
            const originalText = btn.innerText;
            btn.innerText = "کپی شد!";
            setTimeout(() => btn.innerText = originalText, 1500);
        }

        window.openMath = function(btn) {
            const rawText = btn.parentElement.dataset.content;
            const url = `nit5.html?action=process&value=${encodeURIComponent(rawText)}`;
            window.open(url, '_blank');
        }

        // توابع اصلی
        async function appendMessageUI(sender, text, shouldSave) {
            const row = document.createElement("div");
            row.className = `message-row ${sender === 'user' ? 'user-row' : 'bot-row'}`;
            
            const msgBox = document.createElement("div");
            msgBox.className = `message ${sender === 'user' ? 'user-msg' : 'bot-msg'}`;
            
            // پردازش مارک‌داون
            parseMarkdown(text, msgBox);
            row.appendChild(msgBox);

            // اضافه کردن دکمه‌ها فقط برای ربات
            if (sender === 'bot') {
                const actions = document.createElement("div");
                actions.className = "msg-actions";
                actions.dataset.content = text; // ذخیره متن خام اینجا
                actions.innerHTML = `
                    <button onclick="copyRaw(this)">کپی</button>
                    <button onclick="openMath(this)">🧮 ریاضیات</button>
                `;
                row.appendChild(actions);
            }
            
            chatContainer.appendChild(row);

            if (window.MathJax && MathJax.typesetPromise) {
                try { await MathJax.typesetPromise([msgBox]); } catch (e) {}
            }

            if (shouldSave) { saveState(sender, text); }
            scrollToBottom();
        }

        // [بقیه توابع قبلی رو اینجا حفظ کن...]
        const API_KEY = "sk-dhlboXx229zWJrpnc9EAr3fr52UrsXOk85ZevwXfalwkRSNd";
        const API_URL = "https://api.gapgpt.app/v1/responses"; 
        let historyLogic = JSON.parse(localStorage.getItem("bot_history")) || [];
        let summer = localStorage.getItem("bot_summer") || "";
        let chats = parseInt(localStorage.getItem("bot_chats")) || 0;
        let uiMessages = JSON.parse(localStorage.getItem("bot_ui")) || []; 

        window.onload = async () => {
            for (let msg of uiMessages) { await appendMessageUI(msg.sender, msg.content, false); }
        };

        window.sendMessage = async function() {
            let userRaw = document.getElementById("userInput").value.trim();
            if (!userRaw) return;
            await appendMessageUI('user', userRaw, true);
            document.getElementById("userInput").value = "";
            
            try {
                // این بخش همان منطق قبلی توست که API صدا میزنه
                const botResponse = "مثال: $x^2 + y^2 = z^2$"; // اینجا پاسخ API میاد
                await appendMessageUI('bot', botResponse, true);
            } catch(e) {}
        };

        function parseMarkdown(text, msgBox) {
            // منطق پارسر تو که قبلا داشتیم
            msgBox.innerText = text; // ساده‌سازی برای نمایش
        }

        function saveState(sender, content) {
            uiMessages.push({sender, content});
            localStorage.setItem("bot_ui", JSON.stringify(uiMessages));
        }

        window.autoResize = function(el) { el.style.height = 'auto'; el.style.height = (el.scrollHeight) + 'px'; }
        function scrollToBottom() { chatContainer.scrollTop = chatContainer.scrollHeight; }
        window.newChat = function() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
